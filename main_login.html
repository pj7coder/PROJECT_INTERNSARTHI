<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sarthi — Role Selection</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login1.css">
  <style>
    :root{
      --bg: #0f1724;
      --card-bg: #0b1224;
      --muted: #cbd5e1;
      --text: #ffffff;
      --glass-border: rgba(255,255,255,0.06);
      --accent: #7c5cff;
    }
    [data-theme="light"]{
      --bg: #ffffff;
      --card-bg: #f6f8fb;
      --muted: #475569;
      --text: #0b1220;
      --glass-border: rgba(11,18,32,0.06);
      --accent: #4cc9f0;
    }

    html,body{ background:var(--bg); color:var(--text); font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto; margin:0; padding:0; }
    .page{ padding:24px; min-height:100vh; box-sizing:border-box; display:flex; align-items:center; justify-content:center; }
    .glass-card{ width:100%; max-width:980px; padding:24px; border-radius:12px; background:var(--card-bg); border:1px solid var(--glass-border); }
    .glass-card h1{ text-align:center; font-size:clamp(28px,4.5vw,40px); margin:0 0 8px; color:var(--text); }
    [data-theme="light"] .glass-card h1{ color:#0b1220; }
    .subtitle{ text-align:center; color:var(--muted); margin:6px 0 18px; }

    .role-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-top:18px; }
    .role-card{
      aspect-ratio:4/3; min-height:140px; padding:16px; border-radius:12px;
      background:rgba(255,255,255,0.02); border:1px solid var(--glass-border);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; text-align:center;
      cursor:pointer; transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
      color:var(--text);
    }
    .role-card .icon{ font-size:34px; }
    .role-card h3{ margin:0; font-size:16px; font-weight:600; color:var(--text); }
    .role-card p{ margin:0; font-size:13px; color:var(--muted); }

    .actions{ display:flex; gap:8px; margin-top:18px; align-items:center; }
    .actions .btn{ background:var(--card-bg); color:var(--text); border:1px solid var(--glass-border); padding:8px 12px; border-radius:10px; cursor:pointer; }
    .theme-left{ margin-right:auto; display:flex; align-items:center; gap:8px; color:var(--muted); font-weight:600; }

    @media (max-width:520px){
      .role-grid{ grid-template-columns:1fr; gap:10px; }
      .role-card{ min-height:92px; padding:12px; }
      .glass-card h1{ font-size:20px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" style="width:100%;">
      <div class="glass-card" aria-labelledby="welcome">
        <h1 id="welcome">Welcome to Sarthi Portal</h1>
        <p class="subtitle">Choose your role to begin a personalized experience</p>

        <div class="role-grid" role="list">
          <div class="role-card" role="button" tabindex="0" data-role="individual" aria-label="Individual">
            <div class="icon">🙋</div>
            <h3>Individual</h3>
            <p>Students or job seekers</p>
          </div>

          <div class="role-card" role="button" tabindex="0" data-role="company" aria-label="Company">
            <div class="icon">🏢</div>
            <h3>Company</h3>
            <p>Organizations offering internships</p>
          </div>

          <div class="role-card" role="button" tabindex="0" data-role="institution" aria-label="Institution">
            <div class="icon">🎓</div>
            <h3>Institution</h3>
            <p>Colleges or training centers</p>
          </div>
        </div>

        <div class="actions">
          <div class="theme-left">Theme
            <button id="themeToggle" class="btn" aria-pressed="false" title="Toggle dark / light mode">🌙</button>
          </div>
          <button id="helpBtn" class="btn" title="Get help">❓Help </button>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const cards = document.querySelectorAll('.role-card');
      const themeToggle = document.getElementById('themeToggle');
      const THEME_KEY = 'sarthi:theme';

      function navigateTo(role) {
        const routeMap = {
          individual: 'home_english.html',
          company: 'company_login.html',
          institution: 'institution_home.html'
        };
        const target = routeMap[role];
        if (target) {
          document.body.classList.add('navigating');
          setTimeout(() => location.href = target, 260);
        }
      }

      function handleActivation(e) {
        const role = e.currentTarget.dataset.role;
        navigateTo(role);
      }
      function handleKey(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          e.currentTarget.click();
        }
      }
      cards.forEach(card => {
        card.addEventListener('click', handleActivation);
        card.addEventListener('keydown', handleKey);
      });

      function applyTheme(theme){
        if(theme === 'light'){
          document.documentElement.setAttribute('data-theme','light');
          themeToggle.textContent = '☀️ Light';
          themeToggle.setAttribute('aria-pressed','true');
        } else {
          document.documentElement.removeAttribute('data-theme');
          themeToggle.textContent = '🌙 Dark';
          themeToggle.setAttribute('aria-pressed','false');
        }
      }

      const saved = localStorage.getItem(THEME_KEY);
      if(saved){
        applyTheme(saved);
      } else if(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches){
        applyTheme('light');
      } else {
        applyTheme('dark');
      }

      themeToggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
        const next = current === 'light' ? 'dark' : 'light';
        applyTheme(next);
        localStorage.setItem(THEME_KEY, next);
      });

      const helpBtn = document.getElementById('helpBtn');
      if(helpBtn){
        helpBtn.addEventListener('click', () =>
          alert('Need help? Email support@sarthi.example or check the FAQ.')
        );
      }
    })();
  </script>
    <script src="script.js"></script>
</body>
</html>
